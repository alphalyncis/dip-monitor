name: Dip Monitor

on:
  schedule:
    # UTC 时间。美股盘中大致 14:30–21:00 UTC。
    # 这里设为周一到周五,每天 UTC 20:30(美东收盘前后)跑一次。
    # 想更频繁可加多行 cron,比如盘中每小时。
    - cron: "0 15 * * 0-6"
    - cron: "30 20 * * 0-6"
  workflow_dispatch:        # 允许在 Actions 页面手动点运行

permissions:
  contents: write           # 允许提交 state.json

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json || true
          git commit -m "update state $(date -u +%Y-%m-%d)" || echo "no changes"
          git push || echo "nothing to push"
